server:
    port: 8888

langchain4j:
    open-ai:
        chat-model:
            api-key: ${SILICONFLOW_API_KEY}
            base-url: https://api.siliconflow.cn/v1
            model-name: THUDM/GLM-Z1-9B-0414
            temperature: 0.7
            max-tokens: 1000
            log-requests: true
            log-responses: true

app:
    cors:
        allowed-origins:
            - "*"

logging:
    level:
        com.example: DEBUG